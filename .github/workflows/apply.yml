on:
  workflow_dispatch:
  push:
    branches:
      - main

name: apply

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: opentofu/setup-opentofu@v2
      - run: task install
      - run: task lint-check

  apply:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_R2_ENDPOINT: ${{ vars.CLOUDFLARE_R2_ENDPOINT }}
      TF_VAR_ssh_identity: id_ed25519_github
      TF_VAR_dsm_host: ${{ vars.DSM_HOST }}
      TF_VAR_dsm_user: ${{ vars.DSM_USER }}
      TF_VAR_dsm_password: ${{ secrets.DSM_PASSWORD }}
      TF_VAR_hcloud_newt_id: ${{ vars.HCLOUD_NEWT_ID }}
      TF_VAR_hcloud_newt_secret: ${{ secrets.HCLOUD_NEWT_SECRET }}
      TF_VAR_s920p_newt_id: ${{ vars.S920P_NEWT_ID }}
      TF_VAR_s920p_newt_secret: ${{ secrets.S920P_NEWT_SECRET }}
      TF_VAR_cloudflare_dns_api_token: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
      TF_VAR_wg_easy_init_password: ${{ secrets.WG_EASY_INIT_PASSWORD }}
    steps:
      - run: echo "TF_LOG=DEBUG" >> $GITHUB_ENV
        if: runner.debug == '1'
      - uses: actions/checkout@v6
      - run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_ed25519_github
          chmod 600 ~/.ssh/id_ed25519_github
        env:
          SSH_KEY: ${{secrets.SSH_KEY}}
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:github
          ping: ${{ vars.DSM_HOST }}
      - uses: opentofu/setup-opentofu@v2
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.CLOUDFLARE_R2_KEY }}
          aws-secret-access-key: ${{ secrets.CLOUDFLARE_R2_SECRET }}
          aws-region: auto
        continue-on-error: true
      - run: ./bin/get-tfstate.sh
        continue-on-error: true
      - run: tofu init
      - run: tofu validate -no-color
      - run: tofu plan -out=out.tfplan
      - run: tofu apply -auto-approve out.tfplan
      - run: ./bin/put-tfstate.sh
