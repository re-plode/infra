on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

name: lint

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false
      - uses: go-task/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: opentofu/setup-opentofu@v2
      - run: task install
      - run: task lint-check
