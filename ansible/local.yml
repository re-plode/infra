---
- hosts: s920p
  remote_user: docker

  tasks:
  - ansible.builtin.wait_for_connection:

  - ansible.builtin.include_role:
      name: docker_project
    vars:
      project_name: "{{ item }}"
    loop:
      - netsvc # has to come first to create networks
      - monsvc
      - kan
      - rss
      - mmclients
      - mmproviders
